<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Home | DevBlzAlphaK1dXD</title>

<style>
*{
  box-sizing:border-box;
  font-family:"Segoe UI",system-ui,sans-serif;
  scroll-behavior:smooth;
}

/* luôn có scroll dọc */
html{
  overflow-y:scroll;
}

body{
  margin:0;
  min-height:100vh;
  background:#05060a;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:40px 0;
  overflow-x:hidden;
}

/* Background */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 30%, #00aaff33, transparent 45%),
    radial-gradient(circle at 80% 70%, #0033ff33, transparent 45%),
    radial-gradient(circle at center, #020416, #000);
  filter:blur(50px);
  z-index:-1;
}

/* SIMPLE DARK SCROLLBAR */
::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#0b0f18;
}

::-webkit-scrollbar-thumb{
  background:#2a3245;
  border-radius:20px;
}

::-webkit-scrollbar-thumb:hover{
  background:#3a4460;
}

/* Firefox */
*{
  scrollbar-width:thin;
  scrollbar-color:#2a3245 #0b0f18;
}

/* NAV */
.nav{
  width:420px;
  display:flex;
  gap:14px;
}

.nav a{
  flex:1;
  padding:14px;
  text-align:center;
  text-decoration:none;
  color:#eaf6ff;
  border-radius:14px;
  background:rgba(10,15,30,.75);
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px #0077ff33, inset 0 0 10px #00aaff22;
  transition:.15s ease;
}

.nav a:hover{
  transform:translateY(-2px) scale(1.05);
}

/* CARD */
.card{
  width:420px;
  padding:22px;
  border-radius:20px;
  background:rgba(10,15,30,.88);
  backdrop-filter:blur(14px);
  box-shadow:0 0 45px #0088ff33, 0 0 100px #0022ff22;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:14px;
}

.header img{
  width:58px;
  height:58px;
  border-radius:16px;
  object-fit:cover;
  box-shadow:0 0 16px #00aaff55;
}

.header h2{
  margin:0;
  font-size:20px;
  color:#eaf6ff;
}

.header p{
  margin:0;
  font-size:13px;
  color:#7fbfff;
}

/* LINKS */
.links{
  display:flex;
  flex-direction:column;
  gap:16px;
  padding-top:10px;
  border-top:1px solid #00aaff22;
}

.link-btn{
  --x:50%;
  --y:50%;
  padding:15px;
  text-align:center;
  text-decoration:none;
  color:white;
  font-weight:500;
  border-radius:16px;
  background:
    radial-gradient(180px circle at var(--x) var(--y),
    #00ccff, #0044ff, #020417);
  box-shadow:0 0 18px #00aaff33, inset 0 0 10px #00ccff22;
  transition:.15s ease;
}

.link-btn:hover{
  transform:translateY(-2px) scale(1.04);
}

/* EMAIL */
.email-btn{
  background:
    radial-gradient(180px circle at var(--x) var(--y),
    #ffd000, #ff8800, #020417);
}

.email-text{
  font-size:13px;
  opacity:.85;
}

/* Cursor glow */
body::after{
  content:"";
  position:fixed;
  width:120px;
  height:120px;
  pointer-events:none;
  background:radial-gradient(circle,#00aaff33,transparent 70%);
  filter:blur(22px);
  transform:translate(-50%,-50%);
  left:var(--cx,50%);
  top:var(--cy,50%);
}

/* Mobile */
@media(max-width:480px){
  .card,.nav{width:92vw;}
}
</style>
</head>

<body>

  <div class="links">

<script>
document.querySelectorAll(".link-btn").forEach(btn=>{
  btn.addEventListener("mousemove",e=>{
    const r = btn.getBoundingClientRect();
    btn.style.setProperty("--x",(e.clientX - r.left)+"px");
    btn.style.setProperty("--y",(e.clientY - r.top)+"px");
  });
  btn.addEventListener("mouseleave",()=>{
    btn.style.setProperty("--x","50%");
    btn.style.setProperty("--y","50%");
  });
});

document.addEventListener("mousemove",e=>{
  document.body.style.setProperty("--cx",e.clientX+"px");
  document.body.style.setProperty("--cy",e.clientY+"px");
});
</script>

</body>
